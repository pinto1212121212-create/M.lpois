<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>🛡️ הוספת CSP לרינת/דניאל</title>
<style>
*{box-sizing:border-box}
body{background:linear-gradient(180deg,#0a0805,#1a0f05);color:#fff;font-family:-apple-system,sans-serif;margin:0;padding:16px;direction:rtl;min-height:100vh}
.box{max-width:500px;margin:0 auto}
h1{color:#10b981;font-size:22px;margin:0 0 6px;text-align:center}
.sub{color:rgba(255,255,255,0.6);font-size:13px;margin-bottom:14px;text-align:center;line-height:1.6}
.info{background:rgba(16,185,129,0.08);border:1px solid #10b981;border-radius:10px;padding:11px;margin-bottom:14px;font-size:12.5px;color:#6ee7b7;line-height:1.65}
.info b{color:#a7f3d0}
.info code{background:rgba(16,185,129,0.2);padding:2px 6px;border-radius:4px;font-family:monospace;font-size:11px}
.field{margin-bottom:12px}
.field label{display:block;font-size:13px;font-weight:700;margin-bottom:5px}
.field input{width:100%;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.15);border-radius:8px;color:#fff;padding:12px;font-size:14px;font-family:inherit}
.btn{display:block;width:100%;background:linear-gradient(135deg,#10b981,#059669);color:#fff;border:none;padding:16px;border-radius:12px;font-size:16px;font-weight:800;margin:10px 0;cursor:pointer;font-family:inherit;box-shadow:0 4px 16px rgba(16,185,129,0.3)}
.btn:disabled{opacity:0.5}
.log{background:rgba(0,0,0,0.5);border:1px solid rgba(124,58,237,0.3);border-radius:10px;padding:12px;margin-top:10px;font-size:12px;font-family:monospace;white-space:pre-wrap;word-break:break-all;direction:ltr;text-align:left;color:#ddd6fe;max-height:400px;overflow-y:auto}
.log .ok{color:#6ee7b7}
.log .err{color:#fca5a5}
.log .warn{color:#fcd34d}
.log .info{color:#93c5fd}
.log .big{font-size:14px;font-weight:800;color:#fb923c}
</style>
</head>
<body><div class="box">

<h1>🛡️ הוספת CSP</h1>
<div class="sub">משלים את האבטחה של <code>diary-rinat</code> עם Content Security Policy</div>

<div class="info">
<b>💡 מה הכלי עושה:</b><br>
1. מוריד את <code>index.html</code> מ-<code>diary-rinat</code><br>
2. מוסיף CSP meta tag (זהה להודיה)<br>
3. מעלה חזרה ב-UTF-8 נקי<br><br>
<b>✅ לא פוגע בשום דבר קיים</b> — רק מוסיף שורה אחת
</div>

<div class="field">
  <label>🔑 GitHub Token</label>
  <input type="password" id="tok" placeholder="ghp_...">
</div>

<button class="btn" id="go" onclick="addCSP()">🛡️ הוסף CSP ל-diary-rinat</button>

<div class="log" id="log">ממתין...</div>

</div>

<script>
const OWNER = 'pinto1212121212-create';
const REPO = 'diary-rinat';

const CSP_CONTENT = "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://cdn.emailjs.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: blob: https:; connect-src 'self' https://diary-daniel-rinat-default-rtdb.firebaseio.com https://identitytoolkit.googleapis.com https://securetoken.googleapis.com https://api.anthropic.com https://api.emailjs.com https://api.github.com https://raw.githubusercontent.com; media-src 'self' blob:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'; upgrade-insecure-requests";

const CSP_META = '<meta http-equiv="Content-Security-Policy" content="' + CSP_CONTENT + '">';
const ANCHOR = '<meta http-equiv="Expires" content="0">';

const tok = document.getElementById('tok');
const logEl = document.getElementById('log');
const goBtn = document.getElementById('go');

const saved = localStorage.getItem('gh_deploy_token');
if(saved){tok.value = saved;}

function l(msg, cls){
  const s = document.createElement('span');
  if(cls) s.className = cls;
  s.textContent = msg + '\n';
  logEl.appendChild(s);
  logEl.scrollTop = logEl.scrollHeight;
}
function clearLog(){logEl.innerHTML = '';}

// UTF-8 safe base64
function b64encode(str){
  const bytes = new TextEncoder().encode(str);
  let bin = '';
  for(let i=0; i<bytes.length; i++) bin += String.fromCharCode(bytes[i]);
  return btoa(bin);
}
function b64decode(b64){
  const bin = atob(b64.replace(/\s/g, ''));
  const bytes = new Uint8Array(bin.length);
  for(let i=0; i<bin.length; i++) bytes[i] = bin.charCodeAt(i);
  return new TextDecoder('utf-8').decode(bytes);
}

async function gh(token, path, opts){
  const r = await fetch('https://api.github.com'+path, {
    ...opts,
    headers:{'Authorization':'token '+token,'Accept':'application/vnd.github.v3+json',...(opts?.headers||{})}
  });
  if(!r.ok){
    const e = await r.json().catch(()=>({}));
    throw new Error('GitHub '+r.status+': '+(e.message||'unknown'));
  }
  return r.json();
}

async function addCSP(){
  const token = tok.value.trim();
  if(!token){l('❌ הזן token','err'); return;}
  localStorage.setItem('gh_deploy_token', token);
  goBtn.disabled = true;
  clearLog();
  
  try{
    l('═══ שלב 1: מוריד index.html מ-diary-rinat ═══', 'big');
    const fileData = await gh(token, `/repos/${OWNER}/${REPO}/contents/index.html`);
    const original = b64decode(fileData.content);
    const hebrew = (original.match(/[\u0590-\u05FF]/g)||[]).length;
    l('📥 הורד: ' + (original.length/1024).toFixed(0) + ' KB, ' + hebrew.toLocaleString() + ' תווים עברית', 'ok');
    
    l('\n═══ שלב 2: בדיקת מצב נוכחי ═══', 'big');
    const alreadyHasCSP = original.includes('Content-Security-Policy');
    if(alreadyHasCSP){
      l('✅ CSP כבר קיים! אין צורך לתקן', 'ok');
      goBtn.textContent = '✅ כבר מוגן';
      return;
    }
    l('⚠️ CSP לא נמצא — מוסיף...', 'warn');
    
    if(!original.includes(ANCHOR)){
      l('❌ לא מצאתי את ה-anchor meta tag. לא יכול לתקן בטוח.', 'err');
      l('   מחפש: ' + ANCHOR, 'err');
      return;
    }
    l('✅ Anchor נמצא', 'ok');
    
    l('\n═══ שלב 3: מוסיף CSP ═══', 'big');
    const patched = original.replace(ANCHOR, ANCHOR + '\n  ' + CSP_META);
    
    // Verify
    if(!patched.includes(CSP_META)){
      l('❌ הוספת CSP נכשלה', 'err');
      return;
    }
    const hebrew2 = (patched.match(/[\u0590-\u05FF]/g)||[]).length;
    if(hebrew2 !== hebrew){
      l('❌ אזהרה: מספר תווים עברית השתנה! (' + hebrew + ' → ' + hebrew2 + ')', 'err');
      return;
    }
    l('✅ CSP נוסף, עברית נשמרה (' + hebrew2.toLocaleString() + ' תווים)', 'ok');
    l('📏 גודל חדש: ' + (patched.length/1024).toFixed(0) + ' KB', 'info');
    
    l('\n═══ שלב 4: מעלה ל-GitHub ═══', 'big');
    await gh(token, `/repos/${OWNER}/${REPO}/contents/index.html`, {
      method:'PUT',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        message: 'Security: add Content-Security-Policy header',
        content: b64encode(patched),
        sha: fileData.sha
      })
    });
    l('✅ הועלה בהצלחה!', 'ok');
    
    l('\n═══ 🎉 הושלם ═══', 'big');
    l('\n✅ diary-rinat עכשיו עם CSP מלא (כמו הודיה)', 'ok');
    l('\n⏱️ GitHub Pages יעדכן תוך 30-60 שניות', 'info');
    l('🛡️ ההגנה החדשה פעילה אוטומטית — אין מה לעשות', 'info');
    
    goBtn.textContent = '✅ הושלם';
  }catch(e){
    l('\n❌ שגיאה: ' + e.message, 'err');
    console.error(e);
    goBtn.disabled = false;
  }
}
</script>
</body>
</html>
